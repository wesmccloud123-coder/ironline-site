<script src="articles.js"></script>
<script src="script.js"></script>
 
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var slug = params.get("slug");
 
  // No slug — send visitor to the insights index instead of showing a blank page
  if (!slug) {
    window.location.replace("insights.html");
    return;
  }
 
  if (typeof window.ARTICLE_DATA === "undefined") return;
 
  var article = window.ARTICLE_DATA.find(function (a) {
    return a.slug === slug;
  });
 
  // Slug not matched — send to insights index
  if (!article) {
    window.location.replace("insights.html");
    return;
  }
 
  // ── Page title ────────────────────────────────────────────────
  var titleEl = document.getElementById("page-title");
  if (titleEl) titleEl.textContent = article.title + " | IronLine Systems";
 
  // ── Meta description ──────────────────────────────────────────
  var metaDesc = document.getElementById("page-description");
  if (metaDesc) metaDesc.setAttribute("content", article.summary);
 
  // ── Canonical ─────────────────────────────────────────────────
  var fullUrl = "https://ironline.systems/article.html?slug=" + slug;
  var canonicalEl = document.getElementById("page-canonical");
  if (canonicalEl) canonicalEl.setAttribute("href", fullUrl);
 
  // ── Open Graph ────────────────────────────────────────────────
  var ogTitle = document.getElementById("og-title");
  if (ogTitle) ogTitle.setAttribute("content", article.title + " | IronLine Systems");
 
  var ogDesc = document.getElementById("og-description");
  if (ogDesc) ogDesc.setAttribute("content", article.summary);
 
  var ogUrl = document.getElementById("og-url");
  if (ogUrl) ogUrl.setAttribute("content", fullUrl);
 
  // ── Twitter Card ──────────────────────────────────────────────
  var twTitle = document.getElementById("twitter-title");
  if (twTitle) twTitle.setAttribute("content", article.title + " | IronLine Systems");
 
  var twDesc = document.getElementById("twitter-description");
  if (twDesc) twDesc.setAttribute("content", article.summary);
 
  // ── JSON-LD schema ────────────────────────────────────────────
  var schemaEl = document.getElementById("page-schema");
  if (schemaEl) {
    var schema = {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": article.title,
      "description": article.summary,
      "url": fullUrl,
      "author": {
        "@type": "Organization",
        "name": "IronLine Systems",
        "url": "https://ironline.systems"
      },
      "publisher": {
        "@type": "Organization",
        "name": "IronLine Systems",
        "url": "https://ironline.systems"
      },
      "about": {
        "@type": "Thing",
        "name": article.category
      }
    };
    schemaEl.textContent = JSON.stringify(schema, null, 2);
  }
 
  // ── Hero ──────────────────────────────────────────────────────
  var h1 = document.getElementById("article-title");
  if (h1) h1.textContent = article.title;
 
  var categoryEl = document.getElementById("article-category");
  if (categoryEl) categoryEl.textContent = article.category + " | IronLine Systems";
 
  var summaryEl = document.getElementById("article-summary");
  if (summaryEl) summaryEl.textContent = article.summary;
 
  var tagsEl = document.getElementById("article-tags");
  if (tagsEl && article.tags && article.tags.length) {
    tagsEl.innerHTML = article.tags.map(function (tag) {
      return "<span class=\"tag\">" + tag + "</span>";
    }).join("");
  }
 
  // Reveal hero once all content is written in
  var hero = document.getElementById("article-hero");
  if (hero) hero.classList.add("ready");
 
  // ── Article body ──────────────────────────────────────────────
  var container = document.getElementById("articlePage");
  if (!container) return;
 
  var sectionsHtml = "";
  if (article.sections && article.sections.length) {
    sectionsHtml = article.sections.map(function (section) {
      var html = "<div class=\"article-section\">";
      if (section.heading) {
        html += "<h2>" + section.heading + "</h2>";
      }
      if (section.paragraphs && section.paragraphs.length) {
        html += section.paragraphs.map(function (p) {
          return "<p>" + p + "</p>";
        }).join("");
      }
      if (section.bullets && section.bullets.length) {
        html += "<ul>" + section.bullets.map(function (b) {
          return "<li>" + b + "</li>";
        }).join("") + "</ul>";
      }
      html += "</div>";
      return html;
    }).join("");
  }
 
  container.innerHTML =
    "<div class=\"article-body\">" +
      sectionsHtml +
      "<div class=\"article-cta\">" +
        "<p>If this sounds like your business, the first step is a conversation.</p>" +
        "<a href=\"contact.html\" class=\"btn btn-primary\">Get a Free Bottleneck Review</a>" +
        "<a href=\"insights.html\" class=\"btn btn-secondary\">Read More Articles</a>" +
      "</div>" +
    "</div>";
 
  // ── Aside meta ────────────────────────────────────────────────
  var aside = document.getElementById("articleMeta");
  if (aside) {
    var tagsAside = "";
    if (article.tags && article.tags.length) {
      tagsAside =
        "<div class=\"meta-block\">" +
          "<p class=\"meta-label\">Topics</p>" +
          "<div class=\"tag-row\">" +
            article.tags.map(function (tag) {
              return "<span class=\"tag\">" + tag + "</span>";
            }).join("") +
          "</div>" +
        "</div>";
    }
    aside.innerHTML =
      "<div class=\"meta-block\">" +
        "<p class=\"meta-label\">Category</p>" +
        "<p>" + article.category + "</p>" +
      "</div>" +
      tagsAside +
      "<div class=\"meta-block\">" +
        "<p class=\"meta-label\">Published by</p>" +
        "<p>IronLine Systems</p>" +
      "</div>" +
      "<div class=\"meta-block\">" +
        "<a href=\"contact.html\" class=\"btn btn-primary\" style=\"width:100%;text-align:center;\">Book a Strategy Call</a>" +
      "</div>";
  }
 
})();
</script>
